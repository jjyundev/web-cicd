name: Docker to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-web:latest

    - name: Deploy on NCP Server
      uses: appleboy/ssh-action@v1.0.3
      env:
        DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
      with:
        host: ${{ secrets.NCP_SERVER_IP }}
        username: root
        key: ${{ secrets.NCP_SERVER_KEY }}
        password: ${{ secrets.NCP_SERVER_PASSWORD }}
        port: 22
        envs: DOCKERHUB_USER,DOCKERHUB_PASS
        script: |
          cd /root/nextjs-deploy
          echo "$DOCKERHUB_PASS" | sudo docker login -u "$DOCKERHUB_USER" --password-stdin
          ./deploy.sh